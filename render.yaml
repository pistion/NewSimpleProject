# Render Blueprint - Glondia Sites active deployment.
# One Node web service runs the lightweight Express server at server/src/server.js.
# Express serves the built Vite app from dist and exposes the active API endpoints.
# The Nest backend under backend/ is not part of this active deployment.

services:
  - type: web
    name: glondiasites
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /healthz

    disk:
      name: glondia-disk
      mountPath: /var/glondia
      sizeGB: 10

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/glondia/data
