# Render Blueprint — Glondia Sites
# Web service: Express server serves the Vite SPA and API routes.
# Database:    Render-managed PostgreSQL (persistent, survives deploys).

services:
  - type: web
    name: glondiasites
    runtime: node
    region: oregon
    plan: starter
    # Build: install deps, build Vite SPA, generate Prisma client, apply DB migrations
    buildCommand: npm ci && npm run build && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /healthz

    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_APP_MODE
        value: live
      - key: VITE_API_BASE_URL
        value: /api
      - key: DATA_DIR
        value: /var/glondia/data

      # Database — auto-wired from the Render PostgreSQL instance below
      - key: DATABASE_URL
        fromDatabase:
          name: glondiasites-db
          property: connectionString

      # Vultr API — set in Render dashboard
      - key: VULTR_API_KEY
        sync: false

      # PayPal
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: PAYPAL_SANDBOX
        value: "true"

      # Platform config
      - key: PLATFORM_MARKUP_PERCENT
        value: "30"
      - key: PLATFORM_PAYPAL_EMAIL
        sync: false

      # Render integration
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_OWNER_ID
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false

      # Domain registrar (Spaceship)
      - key: SPACESHIP_API_KEY
        sync: false
      - key: SPACESHIP_API_SECRET
        sync: false

      # Misc
      - key: DOMAIN_REGISTRAR_COST_ACCOUNT
        sync: false
      - key: HOSTING_COST_ACCOUNT
        sync: false

databases:
  - name: glondiasites-db
    plan: starter
    region: oregon
    databaseName: glondiasites
    user: glondiasites
