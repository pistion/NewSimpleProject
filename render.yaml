# Render Blueprint - clean Glondia Sites Vite deployment.
# One Node web service serves the built React app from dist.
# No Nest backend, no Prisma migrations, no Postgres, no Redis, no JWT secrets.

services:
  - type: web
    name: glondiasites
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /healthz

    disk:
      name: glondia-disk
      mountPath: /var/glondia
      sizeGB: 10

    envVars:
      - key: NODE_ENV
        value: production
