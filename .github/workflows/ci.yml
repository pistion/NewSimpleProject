name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./tmp/ci.db
      VITE_APP_MODE: demo
      PRISMA_CONNECTION_LIMIT: "5"
      PRISMA_POOL_TIMEOUT: "10"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate

      # Syntax-only check — node --check parses but never executes files,
      # so server entry-points and async top-level code can't hang the runner.
      - name: Syntax check (server JS)
        run: |
          find server/src -name "*.js" \
            -not -path "*/node_modules/*" \
            -not -name "*.min.js" \
            -not -name "*.cjs" | while read f; do
              node --check "$f" 2>&1 && true || { echo "SYNTAX ERROR: $f"; exit 1; }
            done

      - run: npm run build
