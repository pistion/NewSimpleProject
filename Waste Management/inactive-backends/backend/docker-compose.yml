services:
  api:
    build:
      context: .
    command: npm run start:dev
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      APP_NAME: glondia-backend
      APP_PORT: 4000
      APP_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:5173
      API_BASE_URL: http://localhost:4000/api/v1
      DATABASE_URL: postgresql://glondia:glondia_password@postgres:5432/glondia
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change_me_access_secret
      JWT_REFRESH_SECRET: change_me_refresh_secret
      FIELD_ENCRYPTION_KEY: change_me_32_char_field_encrypt_key
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: glondia_minio
      S3_SECRET_ACCESS_KEY: glondia_minio_secret
      S3_ARTIFACTS_BUCKET: glondia-artifacts
      S3_ASSETS_BUCKET: glondia-assets
      S3_PUBLIC_URL: http://localhost:9000
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      EMAIL_PROVIDER: log
      RATE_LIMIT_TTL_SECONDS: 60
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: glondia
      POSTGRES_USER: glondia
      POSTGRES_PASSWORD: glondia_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: glondia_minio
      MINIO_ROOT_PASSWORD: glondia_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Creates the required buckets on first startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 glondia_minio glondia_minio_secret;
        mc mb --ignore-existing local/glondia-artifacts;
        mc mb --ignore-existing local/glondia-assets;
        mc anonymous set download local/glondia-assets;
        exit 0;
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
